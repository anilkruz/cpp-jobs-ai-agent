name: Daily C++ Job Auto Apply

on:
  schedule:
    - cron: "30 3 * * *"   # 9:00 AM IST
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply-jobs:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y wkhtmltopdf
          sudo apt-get install -y chromium-browser  # Required for Selenium
      
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Create necessary directories
        run: |
          mkdir -p custom_resumes
          mkdir -p logs
          
          # Create all JSON files if they don't exist
          for file in applied_jobs.json responses.json follow_ups.json interviews.json manual_review_emails.json validated_emails.json learning_tasks.json auto_apply_log.json competitor_trends.json linkedin_connections.json; do
            if [ ! -f $file ]; then 
              if [ "$file" = "responses.json" ]; then
                echo "{}" > $file
              else
                echo "[]" > $file
              fi
            fi
          done
          
          # Create dashboard files
          if [ ! -f dashboard.html ]; then
            echo "<html><body><h1>Dashboard</h1></body></html>" > dashboard.html
          fi
          
          if [ ! -f advanced_dashboard.html ]; then
            echo "<html><body><h1>Advanced Dashboard</h1></body></html>" > advanced_dashboard.html
          fi
      
      - name: Debug Environment Variables
        run: |
          echo "🔍 Checking environment variables..."
          echo "EMAIL is set: ${{ secrets.EMAIL != '' }}"
          echo "OPENAI_API_KEY is set: ${{ secrets.OPENAI_API_KEY != '' }}"
          echo "SERPAPI_KEY is set: ${{ secrets.SERPAPI_KEY != '' }}"
          echo "APP_PASSWORD is set: ${{ secrets.APP_PASSWORD != '' }}"
          echo "LINKEDIN_EMAIL is set: ${{ secrets.LINKEDIN_EMAIL != '' }}"
          echo "LINKEDIN_PASSWORD is set: ${{ secrets.LINKEDIN_PASSWORD != '' }}"
          echo "TELEGRAM_BOT_TOKEN is set: ${{ secrets.TELEGRAM_BOT_TOKEN != '' }}"
          echo "TELEGRAM_CHAT_ID is set: ${{ secrets.TELEGRAM_CHAT_ID != '' }}"
      
      - name: Run Job Hunter
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          EMAIL: ${{ secrets.EMAIL }}
          APP_PASSWORD: ${{ secrets.APP_PASSWORD }}
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
          LINKEDIN_EMAIL: ${{ secrets.LINKEDIN_EMAIL }}
          LINKEDIN_PASSWORD: ${{ secrets.LINKEDIN_PASSWORD }}
        run: |
          python daily_job_apply.py 2>&1 | tee logs/daily_$(date +'%Y%m%d_%H%M%S').log
      
      - name: Upload application logs and artifacts
        uses: actions/upload-artifact@v4
        with:
          name: application-logs
          path: |
            logs/
            dashboard.html
            advanced_dashboard.html
            *.json
            custom_resumes/
            research_*.txt
            linkedin_*.html
          retention-days: 7
      
      - name: Commit and push tracker files
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Configure git
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          echo "📦 Adding files to git..."
          
          # Add all JSON files
          git add *.json 2>/dev/null || true
          
          # Add HTML dashboards and reports
          git add *.html 2>/dev/null || true
          
          # Add research files
          git add research_*.txt 2>/dev/null || true
          
          # Add logs directory (optional)
          git add logs/ 2>/dev/null || true
          
          # Add custom resumes
          git add custom_resumes/ 2>/dev/null || true
          
          # Check if there are changes to commit
          if ! git diff --quiet --staged; then
            echo "✅ Changes detected, committing..."
            git commit -m "Update job application trackers [skip ci]"
            
            # Pull latest changes before push (avoid conflicts)
            git pull --rebase origin main || true
            
            # Push changes
            git push
          else
            echo "ℹ️ No changes to commit"
          fi
      
      - name: Send Telegram Notification
        if: always()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          message: |
            🚀 *Job Application Workflow Completed*
            
            📅 Date: $(date +'%Y-%m-%d')
            📊 Status: ${{ job.status }}
            
            📁 Check artifacts for:
            • LinkedIn Connections Report
            • Advanced Dashboard
            • Application Logs
          format: markdown
        continue-on-error: true
